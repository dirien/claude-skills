name: Publish Tile

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: tesslio/publish@aa799e9b3dce80ff667c547ccbcc9c821addfda2 # main
        with:
          token: ${{ secrets.TESSL_API_TOKEN }}
